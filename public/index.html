<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../assets/favicon.ico" type="image/x-icon"> 
    <script src="../js/script.js" defer></script>
</head>
<body>
    <section>
        <header>
            <h1>Cadastro</h1>
            <hr>
        </header>
        <form action="script.js" autocomplete="off" novalidate id="form">  
            <div>
                <label for="nome"><p>Nome</p></label>
                <input class="input" type="text" placeholder="Username" id="nome" required maxlength="40" minlength="2">
                <span id="span-required">Nome deve ter no mínimo 2 caracteres.</span>
            </div>

            <div>
                <label for="email"><p>Email</p></label>
                <input class="input" type="email" name="" placeholder="Email" id="email" required maxlength="50">
                <span id="span-required">Digite um email válido.</span>
            </div>
            
            <div>
                <label for="senha"><p>Senha</p></label>
                <input class="input" type="password" placeholder="Password" id="senha" required maxlength="20">
                <span id="span-required">Digite uma senha com no mínimo 8 caracteres.</span>
            </div>

            <div>
                <label for="repeat-senha"> <p>Confirmar senha</p></label>
                <input class="input" type="password" placeholder="Confirm">
                <span id="span-required">Senhas devem ser compatíveis.</span>
            </div>

            <div>
                <button type="submit" style="color: white;" id="submit-button">CADASTRAR</button>
            </div>
        </form>
    </section>
</body>
</html>
