<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../assets/favicon.ico" type="image/x-icon"> 
    <script src="../js/script.js" defer></script>
</head>
<body>
    <section>
        <header>
            <h1>Cadastro</h1>
            <hr>
        </header>
        <form action="script.js" autocomplete="off" novalidate>  
            <div>
                <label for="nome"><p>Nome</p></label>
            </div>
            <div>
                <input class="input" type="text" placeholder="Username" id="nome" required maxlength="40" minlength="2">
                <div class="msg-erro-name"></div>
            </div>

            <div>
                <label for="email"><p>Email</p></label>
            </div>
            <div>
            <input class="input" type="email" name="" placeholder="Email" id="email" required maxlength="50">
                <div class="msg-erro-email"></div>
            </div>
            
            <div>
                <label for="senha"><p>Senha</p></label>
            </div>
            <div>
                <input class="input" type="password" placeholder="Password" id="senha" required maxlength="20" minlength="8">
                <div class="msg-erro-senha"></div>
            </div>

            <div>
                <button type="submit" style="color: white;" id="submit-button">CADASTRAR</button>
            </div>
        </form>
    </section>
</body>
</html>
